# =============================================================
#  CasePilot — Application Configuration
# =============================================================

# Server
server.port=8080
spring.application.name=casepilot

# =============================================================
#  PostgreSQL (Docker)
# =============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/casepilot
spring.datasource.username=${DB_USER:casepilot}
spring.datasource.password=${DB_PASS:casepilot123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =============================================================
#  Gemini API
# =============================================================
gemini.api.key=${GEMINI_API_KEY:DEMO_MODE}
gemini.api.base-url=https://generativelanguage.googleapis.com
gemini.api.model=gemini-2.5-flash

# =============================================================
#  JWT
# =============================================================
jwt.secret=${JWT_SECRET:casepilot-super-secret-key-that-is-at-least-64-characters-long-for-hs256}
jwt.expiration=604800000

# =============================================================
#  WebClient / WebFlux
# =============================================================
spring.webflux.timeout=30000

# =============================================================
#  CORS
# =============================================================
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# =============================================================
#  Logging
# =============================================================
logging.level.com.ailegal=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n